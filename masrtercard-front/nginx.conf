server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # The SPA calls the BFFs under /demo-api/* (VITE_DEMO_API_URL=/demo-api). nginx splits the
  # path between the two backends (same-origin for the browser, so no CORS). The trailing
  # slash on proxy_pass strips the matched prefix. Most specific location wins:
  #   /demo-api/xbs/*      + /demo-api/features/*  → mastercard-bff (cross-border layer)
  #   everything else under /demo-api/*            → app-bff       (entities/auth/integrations)

  # Cross-border (Mastercard) — the /xbs and /features API.
  location /demo-api/xbs/ {
    proxy_pass http://mastercard-bff:4000/xbs/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    client_max_body_size 5m;
  }
  location /demo-api/features/ {
    proxy_pass http://mastercard-bff:4000/features/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    client_max_body_size 5m;
  }

  # App data (entities / auth.me / integrations) — the permanent frontend backend.
  location /demo-api/ {
    proxy_pass http://app-bff:4000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    client_max_body_size 5m;
  }

  # Client-side routed SPA: fall back to index.html for unknown paths.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
